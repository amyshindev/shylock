services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env.backend
    depends_on:
      redis:
        condition: service_started
    networks: [dreamscape]
    restart: unless-stopped

  auth:
    build:
      context: .
      dockerfile: backend/Dockerfile
    entrypoint:
      [
        "uvicorn",
        "auth_main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "9000",
      ]
    env_file:
      - .env.auth
    depends_on:
      redis:
        condition: service_started
    networks: [dreamscape]
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        # Browser calls the public API hostname (no host port publish; Cloudflare only).
        NEXT_PUBLIC_API_BASE_URL: https://api.shylock-trial.xyz
    depends_on:
      - backend
    networks: [dreamscape]
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    networks: [dreamscape]
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel run --token ${TUNNEL_TOKEN}
    env_file:
      - .env
    networks: [dreamscape]
    restart: unless-stopped

networks:
  dreamscape:

volumes:
  postgres_data:
  redis_data:
